<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHEAT LABZ | No Rules. Just Scores.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  <div id="global-loader" class="loader"><div class="loader-bar"></div></div>
  
  <!-- Particles Background Canvas -->
  <canvas id="particles-bg"></canvas>

  <div class="nav-controls" style="position: absolute; top: 16px; right: 24px; z-index: 100;">
    <button id="global-mute-btn" class="icon-btn" aria-label="Toggle Sound" onclick="window.Sound && window.Sound.toggleMute()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
    </button>
    <button id="hamburger-btn" class="icon-btn mobile-only" aria-label="Menu" onclick="document.getElementById('mobile-menu').style.display='flex'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
  </div>

  

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content fade-in">
      <div class="logo-group">
        <h1 class="logo font-display">CHEAT LABZ</h1>
        <p class="subtitle">No rules. Just scores.</p>
      </div>

      <h2 class="headline font-display">Pick a game.<br>Break the record.</h2>
      <p class="sub-headline">19 browser games. One leaderboard. No excuses.</p>

      <div class="cta-group">
        <a href="games.html" class="btn btn-primary">BROWSE GAMES</a>
        <button id="random-game-btn" class="btn btn-outline">RANDOM GAME</button>
        <a href="arena.html" class="btn btn-danger-outline">ENTER ARENA</a>
      </div>

      <div class="live-stats">
        <span class="badge badge-teal">19 Games Live</span>
        <span class="badge badge-purple">Season 3 Active</span>
      </div>
    </div>

    <!-- Scroll Indicator -->
    <div class="scroll-indicator">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>
  </section>

  <!-- Daily Challenges Section -->
  <section class="daily-challenges container section-padding fade-in" style="animation-delay: 200ms;">
    <div class="section-header">
      <h3 class="section-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        DAILY CHALLENGES
      </h3>
      <div class="countdown font-display" id="daily-countdown">--:--:--</div>
    </div>
    
    <div class="challenges-grid" id="challenges-grid">
      <!-- Generated via JS -->
    </div>
  </section>

  <!-- Player Stats Strip -->
  <section class="player-stats-section section-padding fade-in" style="animation-delay: 300ms;">
    <div class="container">
      <div class="stats-strip" id="stats-strip">
        <!-- Cards generated via JS based on localStorage -->
      </div>
    </div>
  </section>

  <!-- Hot Right Now Section -->
  <section class="hot-section container section-padding fade-in" style="animation-delay: 400ms;">
    <div class="section-header">
      <h3 class="section-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"></path>
        </svg>
        HOT RIGHT NOW
      </h3>
      <div class="tab-switcher">
        <button class="tab-pill active">TRENDING</button>
        <button class="tab-pill">NEW</button>
        <button class="tab-pill">CHILL</button>
      </div>
    </div>

    <div class="horizontal-scroll-container" id="hot-games-container">
      <!-- Game Cards injected via JS -->
    </div>
  </section>

  <footer>
    <p>© 2026 CHEAT LABZ — No rules. Just scores.</p>
  </footer>

  <script type="module" src="js/ui/home.js"></script>
  <script>window.addEventListener('load', () => { const l = document.getElementById('global-loader'); if(l) { l.style.opacity=0; setTimeout(()=>l.remove(), 300); } });</script>
  <script type="module" src="js/ui/navbar.js"></script>

  <!-- Global Game Modal -->
  <div id="game-modal" class="game-modal hidden">
    <div class="game-modal-header">
      <button id="close-game" class="btn-icon">← BACK</button>
      <span id="game-modal-title" class="font-display" style="font-size: 14px;"></span>
      <span id="game-modal-score" class="font-display text-accent-1" style="font-size: 14px;">SCORE: 0</span>
    </div>
    <div class="game-canvas-container" id="game-canvas-container">
      <canvas id="game-canvas"></canvas>
    </div>
  </div>

  <script type="module" src="js/ui/modal.js"></script>
</body>
</html>
