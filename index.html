<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/games-data.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHEAT LABZ | Underground Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/home.css">
  <link rel="stylesheet" href="/css/challenge.css">
  <link rel="stylesheet" href="/css/lobby.css">
  <link rel="stylesheet" href="/css/game.css">
  <link rel="stylesheet" href="/css/results.css">
  <link rel="stylesheet" href="/css/matchmaking.css">
  <link rel="stylesheet" href="/css/arena.css">
  <link rel="stylesheet" href="/css/leaderboard.css">
  <link rel="stylesheet" href="/css/game-shell.css">
  <style>
    /* Premium Homepage Overrides */
    body { background-color: var(--bg-base); color: var(--text-primary); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    
    /* Hero Cyber Section */
    .hero-cyber {
      position: relative;
      min-height: 88vh;
      padding-top: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
    }
    .hero-bg-parallax {
      position: absolute;
      inset: -50px;
      background: radial-gradient(circle at center, rgba(108,99,255,0.12) 0%, var(--bg-base) 70%);
      z-index: 0;
      pointer-events: none;
    }
    #pixel-dust-canvas {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      mix-blend-mode: screen;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .glitch-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 3.5rem;
      margin-bottom: 0;
      color: #fff;
      text-shadow: 0 0 20px rgba(108,99,255,0.4);
      position: relative;
      display: inline-block;
      letter-spacing: 0.05em;
    }
    .glitch-title::before, .glitch-title::after {
      content: "CHEAT LABZ";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
    }
    .glitch-title::before {
      left: 2px;
      text-shadow: -2px 0 var(--danger);
      animation: glitch-anim-1 2s infinite linear alternate-reverse;
    }
    .glitch-title::after {
      left: -2px;
      text-shadow: -2px 0 var(--success);
      animation: glitch-anim-2 3s infinite linear alternate-reverse;
    }
    .hero-subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: var(--text-secondary);
      max-width: 480px;
      line-height: 1.65;
      margin: 16px auto 0;
    }
    
    .cta-row {
      display: flex;
      gap: 16px;
      margin-top: 40px;
      justify-content: center;
    }
    
    .btn-enter-grid {
      background: var(--accent);
      color: white;
      padding: 14px 32px;
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background var(--transition), transform var(--transition);
      display: inline-block;
    }
    .btn-enter-grid:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }
    .btn-enter-grid:active {
      transform: translateY(0);
    }
    
    .btn-survive-arena {
      background: transparent;
      color: var(--text-primary);
      padding: 14px 32px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-bright);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
      display: inline-block;
    }
    .btn-survive-arena:hover {
      background: var(--bg-elevated);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    .btn-survive-arena:active {
      transform: translateY(0);
    }
    
    .scroll-hint-chevron {
      margin-top: 48px;
      color: var(--text-muted);
      animation: chevronBounce 1.5s ease-in-out infinite alternate;
    }
    @keyframes chevronBounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(6px); }
    }

    /* Section Headers */
    .section-header-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .section-header-bar {
      width: 3px;
      height: 18px;
      background: var(--accent);
      border-radius: 2px;
    }
    .section-header-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-primary);
      margin: 0;
    }
    .section-header-badge {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--text-muted);
      margin-left: 8px;
    }

    /* Active Missions Cards */
    .mission-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 20px;
      transition: border-color var(--transition);
      position: relative;
    }
    .mission-card:hover {
      border-color: var(--border-default);
    }
    .mission-card.accepted-state {
      border-color: rgba(0, 212, 170, 0.2);
      background: rgba(0, 212, 170, 0.04);
    }
    .mission-card-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
    }
    .mission-card-ap {
      display: inline-block;
      background: rgba(255, 215, 61, 0.12);
      border: 1px solid rgba(255, 215, 61, 0.25);
      border-radius: 999px;
      padding: 3px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--gold);
    }
    .mission-card-desc {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 10px 0 16px 0;
    }
    .btn-mission-accept {
      width: 100%;
      box-sizing: border-box;
      padding: 11px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: 1px solid var(--border-default);
      color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-mission-accept:hover {
      background: var(--bg-elevated);
      border-color: var(--border-bright);
      color: var(--text-primary);
    }
    .mission-card-accepted-row {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--success);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
    }

    /* Trending Uplinks / Game Cards */
    .carousel-wrapper {
      position: relative;
      width: 100%;
    }
    .carousel-wrapper::before,
    .carousel-wrapper::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 60px;
      z-index: 10;
      pointer-events: none;
      transition: opacity var(--transition);
    }
    .carousel-wrapper::before {
      left: 0;
      background: linear-gradient(to right, var(--bg-base), transparent);
    }
    .carousel-wrapper::after {
      right: 0;
      background: linear-gradient(to left, var(--bg-base), transparent);
    }

    .carousel-container {
      display: flex;
      gap: 12px;
      padding: 24px 24px 48px 24px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      cursor: grab;
    }
    .carousel-container::-webkit-scrollbar {
      display: none;
    }
    .carousel-container:active {
      cursor: grabbing;
    }
    .carousel-item {
      flex: 0 0 auto;
    }
    
    .hot-card {
      width: 180px;
      box-sizing: border-box;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 18px 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: border-color var(--transition), transform var(--transition);
    }
    .hot-card:hover {
      border-color: var(--border-default);
      transform: translateY(-3px);
    }
    /* Blur siblings on hover container */
    .carousel-container:hover .hot-card:not(:hover) {
      filter: blur(4px) brightness(0.6);
      transform: scale(0.95);
    }
    .hot-card-icon {
      width: 36px;
      height: 36px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--transition);
    }
    .hot-card:hover .hot-card-icon {
      color: var(--card-accent, var(--accent));
      filter: drop-shadow(0 0 8px var(--card-accent, var(--accent)));
    }
    .hot-card-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      margin-top: 12px;
      margin-bottom: 0;
      color: var(--text-primary);
    }

    /* Hover Stats Popup Styles */
    .hot-card-popup {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      width: 220px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 150ms ease, transform 150ms ease;
      z-index: 100;
      text-align: left;
    }
    .hot-card:hover .hot-card-popup {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
    .popup-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }
    .popup-stats-list {
      display: flex;
      flex-direction: column;
    }
    .popup-stat-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .popup-stat-row:last-child {
      border-bottom: none;
    }
    .popup-stat-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .popup-stat-value {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .popup-actions {
      margin-top: 14px;
    }
    .popup-play-btn {
      flex: 1;
      padding: 10px;
      background: var(--accent);
      color: white;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background var(--transition);
    }
    .popup-play-btn:hover {
      background: var(--accent-hover);
    }
    .popup-info-btn {
      width: 36px;
      height: 36px;
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color var(--transition), color var(--transition);
    }
    .popup-info-btn:hover {
      border-color: var(--border-bright);
      color: var(--text-primary);
    }
    .popup-info-btn svg {
      width: 14px;
      height: 14px;
    }

    @keyframes glitch-anim-1 { 0% { clip-path: inset(20% 0 80% 0); } 20% { clip-path: inset(60% 0 10% 0); } 40% { clip-path: inset(40% 0 50% 0); } 60% { clip-path: inset(80% 0 5% 0); } 80% { clip-path: inset(10% 0 70% 0); } 100% { clip-path: inset(30% 0 20% 0); } }
    @keyframes glitch-anim-2 { 0% { clip-path: inset(10% 0 60% 0); } 20% { clip-path: inset(30% 0 20% 0); } 40% { clip-path: inset(70% 0 10% 0); } 60% { clip-path: inset(20% 0 50% 0); } 80% { clip-path: inset(50% 0 30% 0); } 100% { clip-path: inset(5% 0 80% 0); } }

    .home-section {
      padding: 72px 48px 0 48px;
      max-width: 1160px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }
    .home-section:last-of-type {
      padding-bottom: 80px;
    }
    .section-header-wrapper {
      padding: 0 48px;
      max-width: 1160px;
      margin: 0 auto;
    }
    @media (max-width: 768px) {
      .home-section {
        padding: 72px 20px 0 20px;
      }
      .section-header-wrapper {
        padding: 0 20px;
      }
    }
  </style>
</head>
<body>
  
  <div class="nav-controls" style="position: absolute; top: 24px; right: 32px; z-index: 100;">
    <button id="global-mute-btn" class="icon-btn" aria-label="Toggle Sound" onclick="window.Sound && window.Sound.toggleMute()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
    </button>
  </div>

  <div id="navbar-mount"></div>

  <div id="app"></div>

  <!-- Global Game Modal (Includes Phase 1 Refactor) -->
  <div id="game-modal" class="hidden" style="position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column;">
    <div style="padding: 16px 24px; background: rgba(9,9,11,0.9); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;">
      <button id="close-game" style="background: transparent; border: 1px solid var(--muted); color: #fff; padding: 8px 16px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 12px; cursor: pointer;">← ABORT</button>
      <span id="game-modal-title" style="font-family: 'Press Start 2P', monospace; font-size: 12px; color: var(--cyan);"></span>
      <span id="game-modal-score" style="font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: bold; color: var(--neon);">SCORE: 0</span>
    </div>
    <div id="game-canvas-container" style="flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden;">
      <canvas id="game-canvas"></canvas>
    </div>
  </div>

  <!-- SPA Error Overlay: shows any uncaught JS errors on screen -->
  <script>
    window.__errors = [];
    window.addEventListener('error', e => {
      window.__errors.push(e.message + ' @ ' + e.filename?.split('/').pop() + ':' + e.lineno);
      showErrorOverlay();
    });
    window.addEventListener('unhandledrejection', e => {
      window.__errors.push('Promise: ' + (e.reason?.message || e.reason));
      showErrorOverlay();
    });
    function showErrorOverlay() {
      let el = document.getElementById('__err_overlay');
      if (!el) {
        el = document.createElement('div');
        el.id = '__err_overlay';
        el.style.cssText = 'position:fixed;bottom:10px;left:10px;right:10px;max-height:200px;overflow-y:auto;background:#1a0000;border:2px solid #ff4444;border-radius:8px;padding:12px;z-index:999999;font-family:monospace;font-size:12px;color:#ff8888;';
        document.body.appendChild(el);
      }
      el.innerHTML = '<b style="color:#ff4444">⚠ JS ERRORS:</b><br>' + window.__errors.map(e => '• ' + e).join('<br>');
    }
  </script>

  <!-- SPA Scripts -->
  <script type="module">
    import { initNavbar } from '/js/ui/navbar.js';
    initNavbar();
  </script>
  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/ui/modal.js"></script>
<script>
  window.addEventListener('load', () => {
    const loader = document.getElementById('global-loader');
    if (loader) {
      loader.style.opacity = 0;
      setTimeout(() => loader.remove(), 300);
    }
  });
</script>
</body>
</html>
