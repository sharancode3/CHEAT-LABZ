<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games | CHEAT LABZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/games.css">
</head>
<body>
  <div id="global-loader" class="loader"><div class="loader-bar"></div></div>
  
  <nav class="navbar">
    <div class="nav-container container">
      <a href="index.html" class="nav-logo font-display">CHEAT LABZ</a>
      <div class="nav-links">
        <a href="games.html" class="active">GAMES</a>
        <a href="arena.html">ARENA</a>
        <a href="leaderboard.html">LEADERBOARD</a>
      </div>
      <button id="sound-toggle" class="btn-icon" aria-label="Toggle Sound">
        <!-- SVG for muted speaker (since muted by default) -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <line x1="23" y1="9" x2="17" y2="15"></line>
          <line x1="17" y1="9" x2="23" y2="15"></line>
        </svg>
      </button>
    </div>
  </nav>

  <main class="container section-padding fade-in">
    <header class="games-header">
      <h1 class="font-display">GAME LIBRARY</h1>
      <p class="text-secondary">Pick your poison. 19 ways to test your limits.</p>
    </header>

    <!-- Controls Row: Filter, Search, Sort -->
    <div class="library-controls">
      <div class="filter-tabs" id="filter-tabs">
        <button class="tab-pill active" data-filter="ALL">ALL</button>
        <button class="tab-pill" data-filter="ARCADE">ARCADE</button>
        <button class="tab-pill" data-filter="PUZZLE">PUZZLE</button>
        <button class="tab-pill" data-filter="RACING">RACING</button>
        <button class="tab-pill" data-filter="SKILL">SKILL</button>
      </div>
      
      <div class="search-sort-group">
        <div class="search-box">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="search-input" placeholder="Search games...">
        </div>
        
        <select class="styled-select" id="sort-select">
          <option value="TRENDING">Trending</option>
          <option value="NEW">Newest</option>
          <option value="AZ">A-Z</option>
          <option value="EASY">Easiest</option>
          <option value="HARD">Hardest</option>
        </select>

        <button id="shuffle-btn" class="btn btn-outline" title="Shuffle Games">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
        </button>
      </div>
    </div>

    <!-- Games Grid -->
    <div class="games-grid" id="games-grid">
      <!-- Injected via JS -->
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="empty-state" style="display: none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      <h3>No games found</h3>
      <p class="text-secondary">Try adjusting your filters or search term.</p>
    </div>

    <div class="grid-footer">
      <p class="text-muted" id="games-count">Showing 19 games</p>
    </div>
  </main>

  <footer>
    <p>© 2026 CHEAT LABZ — No rules. Just scores.</p>
  </footer>

  <script type="module" src="js/ui/games.js"></script>

  <div id="mobile-menu" class="mobile-menu-overlay" style="display:none;">
    <button class="close-menu-btn" onclick="document.getElementById('mobile-menu').style.display='none'">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <div class="mobile-nav-links font-display">
      <a href="index.html">HOME</a>
      <a href="games.html">GAMES</a>
      <a href="arena.html">ARENA</a>
      <a href="daily.html">DAILY</a>
    </div>
  </div>

  <script>window.addEventListener('load', () => { const l = document.getElementById('global-loader'); if(l) { l.style.opacity=0; setTimeout(()=>l.remove(), 300); } });</script>
</body>
</html>
