<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cipher Quest | CHEAT LABZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/game-shell.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .game-container {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    canvas {
      background-color: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-card);
    }
    .score-overlay {
      position: absolute;
      top: 24px;
      left: 24px;
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--text-primary);
      text-shadow: 1px 1px 0px #000;
      z-index: 10;
    }
    .round-overlay {
      position: absolute;
      top: 24px;
      right: 24px;
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--accent-1);
      z-index: 10;
    }
    .navbar {
      background-color: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .back-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 14px;
    }
    .back-link:hover { color: #fff; }
  </style>
</head>
<body>
  <div id="global-loader" class="loader"><div class="loader-bar"></div></div>

  <nav class="navbar">
    <a href="games.html" class="back-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      BACK TO GAMES
    </a>
    <div class="font-display" style="font-size: 14px;">CIPHER QUEST</div>
    
    <div class="nav-controls">
      <button id="global-mute-btn" class="icon-btn" aria-label="Toggle Sound" onclick="window.Sound && window.Sound.toggleMute()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
      </button>
      <button id="hamburger-btn" class="icon-btn mobile-only" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
    </div>

  </nav>

  <div class="game-container">
    <div class="score-overlay">
      SCORE: <span id="game-score">0</span>
    </div>
    <div class="round-overlay" id="game-round">
      ROUND 1/10
    </div>
    
    <canvas id="game-canvas" width="600" height="400"></canvas>

    <!-- Overlays -->
    <div id="instructions-overlay" class="overlay" style="display: none;">
      <div class="overlay-content text-center">
        <h2 id="instruction-title" class="font-display" style="margin-bottom: 16px;">CIPHER QUEST</h2>
        <p id="instruction-desc" class="text-secondary" style="margin-bottom: 24px;">Decode the Caesar-cipher word. Type your answer. Hints cost points.</p>
        
        <div style="margin-bottom: 32px;">
          <div style="margin-bottom: 8px;">
            <span class="control-key" style="width: 120px;">KEYBOARD</span> TYPE
          </div>
          <div>
            <span class="control-key">H</span> HINT (-20 PTS)
          </div>
        </div>

        <div class="pulse-text font-display" style="font-size: 12px; color: var(--accent-1);">PRESS SPACE TO START</div>
      </div>
    </div>
    
    <div id="pause-overlay" class="overlay" style="display: none;">
      <div class="overlay-content text-center">
        <h2 class="font-display">PAUSED</h2>
        <p class="text-secondary" style="margin-top: 16px;">Press <span class="control-key">P</span> to resume</p>
      </div>
    </div>

    <div id="gameover-overlay" class="overlay" style="display: none;">
      <div class="overlay-content text-center">
        <h2 class="font-display" style="color: var(--accent-1);">QUEST COMPLETE</h2>
        <div id="new-record-banner" style="display: none; background: rgba(255,217,61,0.2); border: 1px solid var(--accent-4); color: var(--accent-4); padding: 8px; border-radius: 4px; margin: 16px 0; font-weight: 600; font-size: 12px;">NEW RECORD!</div>
        <div style="margin: 24px 0; font-size: 18px;">
          Score: <span id="gameover-score" class="font-display" style="color: #fff; margin-left: 8px;">0</span>
        </div>
        <div class="text-muted" style="margin-bottom: 32px;">
          Best: <span id="gameover-best">0</span>
        </div>
        <div class="cta-group" style="gap: 16px; margin-bottom: 0;">
          <button id="btn-retry" class="btn btn-primary" onclick="GameState.dispatchKey('r')">RETRY (R)</button>
          <a href="games.html" class="btn btn-outline">MENU (ESC)</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/games/cipher-quest.js"></script>

  <div id="mobile-menu" class="mobile-menu-overlay" style="display:none;">
    <button class="close-menu-btn" onclick="document.getElementById('mobile-menu').style.display='none'">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <div class="mobile-nav-links font-display">
      <a href="index.html">HOME</a>
      <a href="games.html">GAMES</a>
      <a href="arena.html">ARENA</a>
      <a href="daily.html">DAILY</a>
    </div>
  </div>

  <script>window.addEventListener('load', () => { const l = document.getElementById('global-loader'); if(l) { l.style.opacity=0; setTimeout(()=>l.remove(), 300); } });</script>
</body>
</html>
