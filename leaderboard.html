<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard | CHEAT LABZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/leaderboard.css">
</head>
<body>
  <div id="global-loader" class="loader"><div class="loader-bar"></div></div>
  
  <div id="navbar-mount"></div>

  <main class="container section-padding fade-in">
    <header class="leaderboard-header">
      <div class="title-row">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent-4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 21h8"></path><path d="M12 17v4"></path><path d="M7 4h10"></path><path d="M6 4v11a6 6 0 0 0 12 0V4"></path><path d="M4 4h2"></path><path d="M18 4h2"></path>
        </svg>
        <h1 class="font-display">LEADERBOARD</h1>
      </div>
      <p class="text-secondary">Your personal hall of fame and overview of all records.</p>
    </header>

    <div class="tabs-container">
      <div class="tab-switcher" id="leaderboard-tabs">
        <button class="tab-pill active" data-target="my-scores">MY SCORES</button>
        <button class="tab-pill" data-target="all-games">ALL GAMES OVERVIEW</button>
      </div>
    </div>

    <!-- View: My Scores -->
    <section id="my-scores" class="tab-content active fade-in">
      <div class="table-wrapper">
        <table class="scores-table" id="scores-table">
          <thead>
            <tr>
              <th>Game</th>
              <th>Best Score</th>
              <th>Runs</th>
              <th>Last Played</th>
              <th>Trend</th>
            </tr>
          </thead>
          <tbody id="scores-tbody">
            <!-- Injected via JS -->
          </tbody>
        </table>
      </div>
      
      <div class="empty-state" id="my-scores-empty" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--accent-4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 24px;">
          <path d="M8 21h8"></path><path d="M12 17v4"></path><path d="M7 4h10"></path><path d="M6 4v11a6 6 0 0 0 12 0V4"></path><path d="M4 4h2"></path><path d="M18 4h2"></path>
        </svg>
        <h3>You haven't played yet.</h3>
        <p class="text-secondary" style="margin-bottom: 24px;">Pick a game and set some records.</p>
        <a href="games.html" class="btn btn-primary">BROWSE GAMES</a>
      </div>

      <div class="actions-row">
        <button id="reset-scores-btn" class="btn btn-danger-outline">RESET ALL MY SCORES</button>
      </div>
    </section>

    <!-- View: All Games Overview -->
    <section id="all-games" class="tab-content fade-in" style="display: none;">
      <div class="overview-controls">
        <label for="game-select" class="text-secondary">Filter by game:</label>
        <select class="styled-select" id="game-select">
          <option value="ALL">All Games</option>
          <!-- Options injected via JS -->
        </select>
      </div>

      <div class="overview-grid" id="overview-grid">
        <!-- Injected via JS -->
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 CHEAT LABZ — No rules. Just scores.</p>
  </footer>

  <script type="module" src="js/ui/leaderboard.js"></script>

  

  <script>window.addEventListener('load', () => { const l = document.getElementById('global-loader'); if(l) { l.style.opacity=0; setTimeout(()=>l.remove(), 300); } });</script>
  <script type="module" src="js/ui/navbar.js"></script>
</body>
</html>
