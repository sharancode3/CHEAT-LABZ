<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOBBY | CHEAT LABZ — Multiplayer Room</title>
  <meta name="description" content="Multiplayer game lobby — waiting room before the match begins.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/challenge.css">

  <!-- Socket.IO Client -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

<!-- ── Hex Grid Background ──────────────────────────────────── -->
<div class="hex-bg" aria-hidden="true">
  <div class="hex-grid"></div>
  <div class="hex-cell" style="top:5%;left:10%;--dur:6s;--delay:0s"></div>
  <div class="hex-cell" style="top:15%;left:50%;--dur:5s;--delay:1s"></div>
  <div class="hex-cell" style="top:30%;left:80%;--dur:7s;--delay:2s"></div>
  <div class="hex-cell" style="top:70%;left:20%;--dur:6s;--delay:0.5s"></div>
  <div class="hex-cell" style="top:85%;left:70%;--dur:5.5s;--delay:1.5s"></div>
</div>

<!-- ── Navbar ────────────────────────────────────────────────── -->
<nav class="challenge-nav" role="navigation" aria-label="Main navigation">
  <a href="../index.html" class="nav-logo" aria-label="CHEAT LABZ home">CHEAT LABZ</a>
  <div class="nav-links">
    <a href="../games.html"       class="nav-link">GAMES</a>
    <a href="../arena.html"       class="nav-link">ARENA</a>
    <a href="index.html"          class="nav-link challenge-tab active">
      <span class="nav-live-dot" aria-hidden="true"></span>
      CHALLENGE
    </a>
    <a href="../leaderboard.html" class="nav-link">LEADERBOARD</a>
  </div>
</nav>

<!-- ── Lobby Layout ──────────────────────────────────────────── -->
<main>
  <div class="lobby-layout">

    <!-- ═══════════════════════════════
         LEFT PANEL — Players
         ═══════════════════════════════ -->
    <div class="lobby-left">

      <!-- Room Code -->
      <div class="room-code-display" role="region" aria-label="Room code">
        <div>
          <div class="rc-label">ROOM CODE</div>
        </div>
        <div class="rc-code" id="room-code" aria-label="Room code">——————</div>
        <button class="rc-copy" id="copy-code-btn" aria-label="Copy room code">
          <svg id="copy-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span id="copy-label">COPY</span>
        </button>
      </div>

      <!-- Invite shortcut -->
      <div style="text-align: center; font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 24px;">
        Invite a friend → Share code:
        <strong style="color: var(--cyan);" id="invite-code-inline">——</strong>
        <button id="copy-link-btn" style="margin-left: 8px; padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border); color: var(--muted); font-size: 10px; font-family: 'JetBrains Mono', monospace; transition: all 0.2s;" aria-label="Copy lobby link">
          Copy Link
        </button>
      </div>

      <!-- Player Slots -->
      <div class="player-slots" id="player-slots" role="list" aria-label="Players in room" aria-live="polite">
        <!-- Injected by JS -->
      </div>

      <!-- Lobby Actions -->
      <div class="lobby-actions">
        <button class="btn-ready" id="ready-btn" aria-pressed="false">
          MARK READY
        </button>
        <!-- Start button — host only, hidden for non-hosts -->
        <button class="btn-start" id="start-btn" disabled aria-disabled="true" style="display:none;">
          START GAME
        </button>
      </div>

    </div>

    <!-- ═══════════════════════════════
         RIGHT PANEL — Game Info
         ═══════════════════════════════ -->
    <div class="game-info-panel" role="complementary" aria-label="Game information">

      <div class="game-info-icon" id="game-icon" aria-hidden="true">🎮</div>
      <h2 class="game-info-title" id="game-name">Loading...</h2>
      <p class="game-info-desc" id="game-desc">—</p>

      <!-- How to Play Accordion -->
      <div>
        <div class="accordion-header" id="htp-header" role="button" tabindex="0" aria-expanded="false" aria-controls="htp-body">
          HOW TO PLAY
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <div class="accordion-body" id="htp-body" role="region" aria-labelledby="htp-header">
          <span id="htp-content">Loading controls...</span>
        </div>
      </div>

      <!-- Game Settings — host editable -->
      <div>
        <div class="accordion-header" id="settings-header" role="button" tabindex="0" aria-expanded="false" aria-controls="settings-body">
          GAME SETTINGS
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <div class="accordion-body" id="settings-body" role="region" aria-labelledby="settings-header">
          <div class="settings-grid" id="settings-grid">
            <!-- Injected by JS per game -->
          </div>
        </div>
      </div>

      <!-- Match Rules -->
      <div class="match-rules" role="region" aria-label="Match rules">
        <div class="rule-row">
          <span class="rule-icon" aria-hidden="true">👥</span>
          <span id="rule-players">2 players</span>
        </div>
        <div class="rule-row">
          <span class="rule-icon" aria-hidden="true">🏆</span>
          <span id="rule-win">First to finish wins</span>
        </div>
        <div class="rule-row">
          <span class="rule-icon" aria-hidden="true">⏱️</span>
          <span id="rule-rounds">Single round</span>
        </div>
      </div>

    </div>
  </div>
</main>

<!-- ── Countdown Overlay ──────────────────────────────────────── -->
<div class="countdown-overlay" id="countdown-overlay" role="dialog" aria-modal="true" aria-live="assertive">
  <div class="countdown-number" id="countdown-number" aria-label="Countdown">3</div>
  <div class="countdown-sub" id="countdown-sub">GET READY</div>
</div>

<!-- ── Toast Container ───────────────────────────────────────── -->
<div class="challenge-toast-container" id="toast-container" aria-live="polite"></div>

<!-- ── Scripts ───────────────────────────────────────────────── -->
<script type="module">
import SocketClient from './js/socket-client.js';
import { getChallengeIcon } from '../assets/icons/challenge-icons.js';
import { initGameRunner } from './js/game-runner.js';

initGameRunner();

// ── URL Params ────────────────────────────────────────────────────────────
const params  = new URLSearchParams(window.location.search);
const CODE    = (params.get('code') || '').toUpperCase().trim();
const GAME_ID = params.get('game') || 'multiplayer-snake';

if (!CODE) {
  window.location.href = 'index.html';
}

// ── Game Data (mirrors index.html catalogue) ──────────────────────────────
const GAME_DATA = {
  'rock-paper-scissors': {
    name: 'ROCK PAPER SCISSORS',
    color: '#ff6b6b',
    desc: 'Best of 5 rounds. Simple, fast, psychological warfare.',
    controls: 'Click the Rock, Paper, or Scissors card before time runs out.',
    rules: { players: '2 players', win: 'First to 3 round wins', rounds: 'Best of 5' },
    settings: [
      { key: 'startingRound', label: 'Starting Round', opts: ['1', '2', '3', '4', '5'] }
    ],
  },
  'tic-tac-toe': {
    name: 'TIC TAC TOE',
    color: '#6c63ff',
    desc: '30-second turn limit. Best of 3 games. The classic, evolved.',
    controls: 'Click an empty cell to place your symbol. 30 second time limit per turn.',
    rules: { players: '2 players', win: 'Best of 3 games wins', rounds: 'Best of 3' },
    settings: [
      { key: 'startingRound', label: 'Starting Round', opts: ['1', '2', '3'] }
    ],
  },
  'reflex-duel': {
    name: 'REFLEX DUEL',
    color: '#00b894',
    desc: 'React to the stimulus faster than your opponent. No false starts!',
    controls: 'Press SPACE or tap the screen the moment the shape or color appears. Do not press early.',
    rules: { players: '2 players', win: 'Most rounds won', rounds: '10 rounds' },
    settings: [
      { key: 'startingRound', label: 'Starting Round', opts: ['1', '2', '3', '4', '5'] }
    ],
  },
  'word-duel': {
    name: 'WORD DUEL',
    color: '#fd79a8',
    desc: 'Real-time typing race. Type the words before they do. 5 rounds.',
    controls: 'Type the displayed word on your keyboard. Case-insensitive.',
    rules: { players: '2 players', win: 'Highest score wins', rounds: '5 rounds' },
    settings: [
      { key: 'startingRound', label: 'Starting Round', opts: ['1', '2', '3', '4', '5'] }
    ],
  },
  'multiplayer-snake': {
    name: 'SNAKE ARENA',
    color: '#00d4aa',
    desc: 'Head-to-head snake. Cut them off, grab power-ups, outlast them.',
    controls: 'Arrow keys or WASD to steer. Avoid walls and snakes.',
    rules: { players: '2 players', win: 'First to 3 round wins', rounds: 'Best of 3' },
    settings: [
      { key: 'startingRound', label: 'Starting Round', opts: ['1', '2', '3', '4', '5'] }
    ],
  },
};

const game = GAME_DATA[GAME_ID] || {
  name: GAME_ID.replace(/-/g, ' ').toUpperCase(),
  color: '#8B5CF6',
  desc: 'Multiplayer game — coming soon!',
  controls: 'Follow on-screen instructions.',
  rules: { players: '2 players', win: 'Best player wins', rounds: 'Single round' },
  settings: [],
};

// ── State ─────────────────────────────────────────────────────────────────
let currentRoom = null;
let mySocketId  = null;
let isHost      = false;
let isReady     = false;
let currentSettings = {};

game.settings?.forEach(s => { currentSettings[s.key] = s.default; });

// ── Populate static game info ─────────────────────────────────────────────
document.getElementById('room-code').textContent   = CODE;
document.getElementById('invite-code-inline').textContent = CODE;
document.getElementById('game-icon').innerHTML     = getChallengeIcon(GAME_ID);
document.getElementById('game-icon').style.color   = game.color;
document.getElementById('game-icon').style.background = `rgba(255,255,255,0.04)`;
document.getElementById('game-icon').style.borderColor = `rgba(255,255,255,0.1)`;
document.getElementById('game-name').textContent   = game.name;
document.getElementById('game-desc').textContent   = game.desc;
document.getElementById('htp-content').textContent = game.controls;
document.getElementById('rule-players').textContent = game.rules.players;
document.getElementById('rule-win').textContent    = game.rules.win;
document.getElementById('rule-rounds').textContent = game.rules.rounds;

// ── Copy Code ─────────────────────────────────────────────────────────────
document.getElementById('copy-code-btn').addEventListener('click', copyCode);
document.getElementById('copy-link-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(window.location.href).catch(() => {});
  showToast('Lobby link copied!', 'success');
});

function copyCode() {
  navigator.clipboard.writeText(CODE).then(() => {
    const btn   = document.getElementById('copy-code-btn');
    const label = document.getElementById('copy-label');
    btn.classList.add('copied');
    label.textContent = 'COPIED!';
    setTimeout(() => {
      btn.classList.remove('copied');
      label.textContent = 'COPY';
    }, 1500);
  }).catch(() => {});
}

// ── Accordion ─────────────────────────────────────────────────────────────
function initAccordion(headerId, bodyId) {
  const header = document.getElementById(headerId);
  const body   = document.getElementById(bodyId);
  if (!header || !body) return;

  header.addEventListener('click', () => {
    const open = body.classList.toggle('open');
    header.classList.toggle('open', open);
    header.setAttribute('aria-expanded', open);
  });

  header.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); header.click(); }
  });
}

initAccordion('htp-header', 'htp-body');
initAccordion('settings-header', 'settings-body');

// ── Settings Grid ─────────────────────────────────────────────────────────
function renderSettings() {
  const grid = document.getElementById('settings-grid');
  if (!game.settings?.length) {
    grid.innerHTML = '<div style="font-size:12px;color:var(--muted);">No settings for this game.</div>';
    return;
  }

  grid.innerHTML = game.settings.map(s => `
    <div class="setting-row">
      <span class="setting-label">${s.label}</span>
      <div class="setting-options" role="group" aria-label="${s.label} options">
        ${s.opts.map(opt => `
          <button class="setting-opt${currentSettings[s.key] === opt ? ' active' : ''}"
                  data-setting="${s.key}"
                  data-value="${opt}"
                  ${!isHost ? 'disabled aria-disabled="true"' : ''}
                  aria-pressed="${currentSettings[s.key] === opt}">
            ${opt}
          </button>
        `).join('')}
      </div>
    </div>
  `).join('');

  if (isHost) {
    grid.querySelectorAll('.setting-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.setting;
        const val = btn.dataset.value;
        currentSettings[key] = val;

        // Update UI
        grid.querySelectorAll(`[data-setting="${key}"]`).forEach(b => {
          b.classList.toggle('active', b.dataset.value === val);
          b.setAttribute('aria-pressed', b.dataset.value === val);
        });

        // Sync to all players
        SocketClient.updateSettings(CODE, currentSettings);
      });
    });
  }
}

// ── Player Slots ──────────────────────────────────────────────────────────
function renderSlots(room) {
  const maxPlayers = room?.maxPlayers || 4;
  const players    = room?.players    || [];
  const container  = document.getElementById('player-slots');

  container.innerHTML = Array.from({ length: maxPlayers }, (_, i) => {
    const player = players[i];
    if (!player) {
      return `
        <div class="player-slot empty" role="listitem" aria-label="Empty slot">
          <div class="player-avatar" style="" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
          <div class="slot-info">
            <div class="slot-name">Waiting for player...</div>
          </div>
        </div>
      `;
    }

    const isMe = player.socketId === mySocketId;
    const initials = (player.displayName || 'P')[0].toUpperCase();

    return `
      <div class="player-slot${isMe ? ' is-me' : ''}" role="listitem" aria-label="${player.displayName}${player.isHost ? ', host' : ''}${player.ready ? ', ready' : ', not ready'}">
        <div class="player-avatar" style="background: ${player.color};" aria-hidden="true">${initials}</div>
        <div class="slot-info">
          <div class="slot-name">${escapeHtml(player.displayName)}${isMe ? ' <span style="color:var(--muted);font-size:10px;">(you)</span>' : ''}</div>
          <div class="slot-badges">
            ${player.isHost ? '<span class="badge-host" aria-label="Host">HOST</span>' : ''}
          </div>
        </div>
        <div class="slot-status ${player.ready ? 'ready' : 'waiting'}" aria-live="polite">
          ${player.ready
            ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg> READY`
            : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> WAITING`
          }
        </div>
      </div>
    `;
  }).join('');
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Update lobby UI from room data ────────────────────────────────────────
function updateLobbyUI(room) {
  currentRoom = room;

  const me = room.players?.find(p => p.socketId === mySocketId);
  isHost  = me?.isHost  || false;
  isReady = me?.ready   || false;

  renderSlots(room);
  updateButtons(room);

  if (isHost) {
    renderSettings();
    document.getElementById('start-btn').style.display = '';
  }
}

function updateButtons(room) {
  const readyBtn = document.getElementById('ready-btn');
  const startBtn = document.getElementById('start-btn');

  readyBtn.textContent = isReady ? 'READY ✓' : 'MARK READY';
  readyBtn.classList.toggle('is-ready', isReady);
  readyBtn.setAttribute('aria-pressed', isReady);

  if (startBtn.style.display !== 'none') {
    const allReady = room.players?.every(p => p.ready) && (room.players?.length >= 2);
    startBtn.disabled = !allReady;
    startBtn.setAttribute('aria-disabled', !allReady);
    startBtn.title = allReady ? '' : 'Wait for all players to mark ready';
  }
}

// ── Countdown Overlay ─────────────────────────────────────────────────────
function playCountdown(seconds) {
  const overlay = document.getElementById('countdown-overlay');
  const numEl   = document.getElementById('countdown-number');
  const subEl   = document.getElementById('countdown-sub');

  overlay.classList.add('active');

  let count = seconds;
  function tick() {
    numEl.classList.remove('go');
    void numEl.offsetWidth;

    if (count > 0) {
      numEl.textContent = count;
      subEl.textContent = 'GET READY';
      count--;
      setTimeout(tick, 1000);
    } else {
      numEl.classList.add('go');
      numEl.textContent = 'GO!';
      subEl.textContent = 'GOOD LUCK';
    }
  }
  tick();
}

// ── Socket Events ─────────────────────────────────────────────────────────
SocketClient.on('identity', (data) => {
  mySocketId = data.socketId;

  // After identity received, auto-join the room from URL params
  const identity = SocketClient.getSavedIdentity();
  SocketClient.joinRoom(CODE, identity?.displayName);
});

SocketClient.onRoomJoined(({ room }) => {
  updateLobbyUI(room);
});

SocketClient.onRoomCreated(({ room }) => {
  updateLobbyUI(room);
});

SocketClient.onRoomUpdate((room) => {
  updateLobbyUI(room);
});

SocketClient.onRoomError(({ message }) => {
  showToast(message, 'error');
  // Redirect back if room doesn't exist
  if (message.includes('not found')) {
    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
  }
});

SocketClient.onPlayerJoined(({ displayName }) => {
  showToast(`${displayName} joined!`, 'success');
});

SocketClient.onPlayerLeft(({ displayName }) => {
  showToast(`${displayName} left the room.`, 'info');
});

SocketClient.onCountdown(({ seconds }) => {
  playCountdown(seconds);
});

SocketClient.onGameStart(({ room }) => {
  document.getElementById('countdown-overlay').classList.remove('active');
  // game-runner.js handles the canvas setup
});

// ── Button Actions ────────────────────────────────────────────────────────
document.getElementById('ready-btn').addEventListener('click', () => {
  SocketClient.markReady(CODE);
});

document.getElementById('start-btn').addEventListener('click', () => {
  SocketClient.startGame(CODE);
});

// ── Leave on page unload ──────────────────────────────────────────────────
window.addEventListener('beforeunload', () => {
  SocketClient.leaveRoom(CODE);
});

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `challenge-toast challenge-toast--${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ── Initial render (loading state) ────────────────────────────────────────
renderSlots(null);
renderSettings();
</script>

</body>
</html>
