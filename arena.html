<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena Mode | CHEAT LABZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="css/global.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: var(--bg-primary);
    }
    .navbar {
      background-color: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .back-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 14px;
    }
    .back-link:hover { color: #fff; }
    
    .arena-header {
      text-align: center;
      padding: 64px 24px 32px;
    }
    .arena-title {
      font-size: 32px;
      color: var(--accent-3);
      margin-bottom: 8px;
    }
    .total-score-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      display: inline-block;
      margin-top: 32px;
      min-width: 300px;
      box-shadow: var(--shadow-card);
    }
    .total-score-value {
      font-size: 48px;
      color: #fff;
      margin-top: 8px;
    }
    
    .gauntlet-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 900px;
      margin: 0 auto 64px;
      padding: 0 24px;
    }
    .gauntlet-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 24px;
      text-align: center;
      position: relative;
      transition: all 0.3s ease;
    }
    .gauntlet-card.completed {
      border-color: var(--accent-2);
    }
    .gauntlet-card.locked {
      opacity: 0.5;
      pointer-events: none;
    }
    .card-num {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-main);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-family: var(--font-display);
    }
    .gauntlet-card.completed .card-num {
      border-color: var(--accent-2);
      color: var(--accent-2);
    }
    .game-name {
      font-size: 14px;
      margin-bottom: 8px;
      margin-top: 8px;
    }
    .multiplier {
      font-size: 10px;
      color: var(--accent-4);
      margin-bottom: 16px;
    }
    .game-score {
      font-size: 24px;
      color: #fff;
      margin-bottom: 16px;
    }
    
    @media (max-width: 768px) {
      .gauntlet-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="global-loader" class="loader"><div class="loader-bar"></div></div>

  <div id="navbar-mount"></div>

  <div class="container fade-in" style="display: flex; gap: 40px; margin-top: 40px; padding-bottom: 80px;">
    <!-- LEFT SIDE: Game Selection Grid -->
    <div style="flex: 2;">
      <h2 class="font-display" style="font-size: 18px; margin-bottom: 24px;">SELECT GAME</h2>
      <div id="arena-games-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
        <!-- JS rendered -->
      </div>
    </div>

    <!-- RIGHT SIDE: Info Panel -->
    <div style="flex: 1;">
      <div class="arena-info-panel" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 24px; position: sticky; top: 100px;">
        <h2 class="font-display" style="color: var(--accent-3); display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 17.5L3 6l3-3 11.5 11.5"></path><path d="M13 19l6-6"></path><path d="M16 16l4 4"></path><path d="M19 21l2-2"></path><path d="M9.5 8.5L21 20l-3 3-11.5-11.5"></path><path d="M11 5l-6 6"></path><path d="M8 8L4 4"></path><path d="M5 3L3 5"></path></svg>
          ARENA MODE
        </h2>
        <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 24px;">3 rounds. Score carries over. Difficulty ramps each round. Beat your arena best.</p>
        
        <div style="margin-bottom: 24px;">
          <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">YOUR ARENA BEST</div>
          <div id="arena-best-score" class="font-display" style="font-size: 24px; color: #fff;">0</div>
        </div>

        <button id="start-arena-btn" class="btn btn-primary" style="width: 100%; padding: 16px; opacity: 0.4; cursor: not-allowed;" disabled>START ARENA</button>
      </div>
    </div>
  </div>

  <!-- Arena Interstitial Modal -->
  <div id="arena-interstitial" class="game-modal hidden" style="justify-content: center; align-items: center; text-align: center;">
    <h2 id="arena-round-title" class="font-display" style="font-size: 32px; color: var(--accent-1); margin-bottom: 16px;">ROUND 1 COMPLETE</h2>
    <div id="arena-round-score" class="font-display" style="font-size: 48px; color: #fff;">Score: 0</div>
  </div>

  <script type="module" src="js/ui/arena.js"></script>

  

  <script>window.addEventListener('load', () => { const l = document.getElementById('global-loader'); if(l) { l.style.opacity=0; setTimeout(()=>l.remove(), 300); } });</script>
  <script type="module" src="js/ui/navbar.js"></script>

  <!-- Global Game Modal -->
  <div id="game-modal" class="game-modal hidden">
    <div class="game-modal-header">
      <button id="close-game" class="btn-icon">← BACK</button>
      <span id="game-modal-title" class="font-display" style="font-size: 14px;"></span>
      <span id="game-modal-score" class="font-display text-accent-1" style="font-size: 14px;">SCORE: 0</span>
    </div>
    <div class="game-canvas-container" id="game-canvas-container">
      <canvas id="game-canvas"></canvas>
    </div>
  </div>

  <script type="module" src="js/ui/modal.js"></script>
</body>
</html>
