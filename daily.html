<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Challenge | CHEAT LABZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="css/global.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: var(--bg-main);
    }
    .navbar {
      background-color: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .back-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 14px;
    }
    .back-link:hover { color: #fff; }
    
    .daily-header {
      text-align: center;
      padding: 64px 24px 32px;
    }
    .daily-title {
      font-size: 32px;
      color: var(--accent-4);
      margin-bottom: 8px;
    }
    .daily-date {
      color: var(--text-secondary);
      font-size: 16px;
    }
    .total-score-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      display: inline-block;
      margin-top: 32px;
      min-width: 300px;
      box-shadow: var(--shadow-card);
    }
    .total-score-value {
      font-size: 48px;
      color: #fff;
      margin-top: 8px;
    }
    
    .gauntlet-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 900px;
      margin: 0 auto 64px;
      padding: 0 24px;
    }
    .gauntlet-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 24px;
      text-align: center;
      position: relative;
    }
    .gauntlet-card.completed {
      border-color: var(--accent-2);
    }
    .gauntlet-card.locked {
      opacity: 0.5;
      pointer-events: none;
    }
    .card-num {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-main);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-family: var(--font-display);
    }
    .gauntlet-card.completed .card-num {
      border-color: var(--accent-2);
      color: var(--accent-2);
    }
    .game-name {
      font-size: 14px;
      margin-bottom: 16px;
      margin-top: 8px;
    }
    .game-score {
      font-size: 24px;
      color: #fff;
      margin-bottom: 16px;
    }
    
    @media (max-width: 768px) {
      .gauntlet-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="global-loader" class="loader"><div class="loader-bar"></div></div>

  <nav class="navbar">
    <a href="index.html" class="back-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      HOME
    </a>
    <div class="font-display" style="font-size: 14px;">GAUNTLET</div>
    
    <div class="nav-controls">
      <button id="global-mute-btn" class="icon-btn" aria-label="Toggle Sound" onclick="window.Sound && window.Sound.toggleMute()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
      </button>
      <button id="hamburger-btn" class="icon-btn mobile-only" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
    </div>

  </nav>

  <div class="daily-header fade-in">
    <h1 class="daily-title font-display">DAILY CHALLENGE</h1>
    <p class="daily-date font-display" id="date-display">2026-06-13</p>
    
    <div class="total-score-box">
      <div class="font-display" style="font-size: 12px; color: var(--text-secondary);">TOTAL COMBINED SCORE</div>
      <div class="total-score-value font-display" id="total-score">0</div>
      <div id="completion-status" style="margin-top: 16px; font-weight: 600; color: var(--accent-2); display: none;">CHALLENGE COMPLETED</div>
    </div>
  </div>

  <div class="gauntlet-grid fade-in" id="gauntlet-grid" style="animation-delay: 200ms;">
    <!-- Rendered via JS -->
  </div>

  <script type="module" src="js/ui/daily.js"></script>

  <div id="mobile-menu" class="mobile-menu-overlay" style="display:none;">
    <button class="close-menu-btn" onclick="document.getElementById('mobile-menu').style.display='none'">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <div class="mobile-nav-links font-display">
      <a href="index.html">HOME</a>
      <a href="games.html">GAMES</a>
      <a href="arena.html">ARENA</a>
      <a href="daily.html">DAILY</a>
    </div>
  </div>

  <script>window.addEventListener('load', () => { const l = document.getElementById('global-loader'); if(l) { l.style.opacity=0; setTimeout(()=>l.remove(), 300); } });</script>
</body>
</html>
